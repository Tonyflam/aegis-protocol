services:
  aegis-agent:
    build: ./agent
    container_name: aegis-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DRY_RUN=false
    volumes:
      - agent-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: External cron pinger for Vercel Hobby plan
  # Calls /api/guardian/cron every 5 minutes
  cron-pinger:
    image: alpine:latest
    container_name: aegis-cron
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c "
      apk add --no-cache curl &&
      echo '*/5 * * * * curl -sf -H \"Authorization: Bearer $${CRON_SECRET}\" $${APP_URL}/api/guardian/cron > /dev/null 2>&1' | crontab - &&
      crond -f
      "
    environment:
      - APP_URL=${APP_URL:-https://aegisguardian.xyz}
      - CRON_SECRET=${CRON_SECRET:-}

volumes:
  agent-data:
